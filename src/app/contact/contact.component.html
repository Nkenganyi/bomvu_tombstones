<!-- 📌 CONTACT INFO -->
<section class="container py-5">
  <div class="row">
    <div class="col-lg-5">
      <h2 class="fw-bold mb-3">Get In Touch</h2>

      <p>
        <strong>📍 Address:</strong><br />
        47 Canute Road, Amalinda<br />
        East London, EC, South Africa
      </p>

      <p>
        <strong>📞 Phone:</strong> <br /><a href="tel:+27727556166"
          >+27 72 755 6166</a
        >
      </p>

      <p>
        <strong>📧 Email:</strong> <br /><a
          href="mailto:info@bomvutombstones.co.za"
          >info@bomvutombstones.co.za</a
        >
      </p>
    </div>

    <!-- ✉ CONTACT FORM -->

    <div class="col-lg-7">
      <h4 class="fw-semibold mb-3">Send us a message</h4>

      <form [formGroup]="contactForm" (ngSubmit)="submitForm()">
        <div class="mb-3">
          <input
            type="text"
            formControlName="name"
            class="form-control"
            placeholder="Your Name"
          />
        </div>

        <div class="mb-3">
          <input
            type="email"
            formControlName="email"
            class="form-control"
            placeholder="Your Email"
          />
        </div>
        <div class="mb-3">
          <input
            type="text"
            formControlName="phone"
            class="form-control"
            placeholder="Phone Number"
          />
        </div>
        <div class="mb-3">
          <input
            type="text"
            formControlName="subject"
            class="form-control"
            placeholder="Subject"
          />
        </div>

        <div class="mb-3">
          <textarea
            formControlName="message"
            class="form-control"
            rows="5"
            placeholder="Your Message"
          ></textarea>
        </div>

        <button
          class="btn btn-primary w-100"
          type="submit"
          [disabled]="loading || contactForm.invalid"
        >
          {{ loading ? "Sending..." : "Send Message" }}
        </button>
      </form>

      <!-- Alerts -->
      <div *ngIf="success" class="alert alert-success mt-3">
        Message sent successfully!
      </div>

      <div *ngIf="error" class="alert alert-danger mt-3">
        Failed to send message. Try again.
      </div>
    </div>
  </div>
</section>
